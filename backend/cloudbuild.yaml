steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "gcr.io/$PROJECT_ID/kupe-backend:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/kupe-backend:latest"
      - .
  - name: gcr.io/cloud-builders/docker
    args: [push, "gcr.io/$PROJECT_ID/kupe-backend:$SHORT_SHA"]
  - name: gcr.io/cloud-builders/docker
    args: [push, "gcr.io/$PROJECT_ID/kupe-backend:latest"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - kupe-backend
      - "--image=gcr.io/$PROJECT_ID/kupe-backend:$SHORT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--min-instances=1"
      - "--service-account=kupe-backend-sa@$PROJECT_ID.iam.gserviceaccount.com"

images:
  - "gcr.io/$PROJECT_ID/kupe-backend:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/kupe-backend:latest"

options:
  logging: CLOUD_LOGGING_ONLY
